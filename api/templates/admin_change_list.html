{% extends "admin/change_list.html" %}

{% block object-tools %}
<style>

    .container {
        max-width: 600px;
        background: #fff;
        border-radius: 5px;
        width: 100%;
        padding: 20px;
        box-shadow: 0 2px 2px 3px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .wrap {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        border-bottom: 2px solid #ddd;
        padding-bottom: 15px;
    }

    .flex {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin-bottom: 15px;
    }

    label {
        font-size: 14px;
        margin-bottom: 20px;
    }

    .classInput {
        padding: 8px 10px;
        background: #ddd;
        border: none;
        width: 100%;
        border-radius: 5px;
    }

    .classInput:focus {
        outline: 1px solid #efefef;
    }

    .submit-btn {
        align-self: flex-end;
        padding: 10px 20px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .submit-btn:hover {
        background: #45a049;
    }

    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background: #fff;
        padding: 20px;
        border-radius: 5px;
        max-width: 630px;
        width: 100%;
    }

    .close {
        color: #aaa;
        float: right;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
    }

    .close:hover,
    .close:focus {
        color: black;
        text-decoration: none;
        cursor: pointer;
    }
</style>
  <ul class="object-tools">
    <li>
        <a id="openModalBtn" href="#" class="addlink">
          Add AI Experiences
        </a>
      </li>
    <li>
      <a href="/admin/api/experience/add/" class="addlink">
        Add experience
      </a>
    </li>
  </ul>
  <div id="myModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <form action="#" method="post" style="display: inline;">
            {% csrf_token %}
            <div class="container">
                <div class="wrap">
                    <h2>ADD AI EXPERIENCES</h2>
                </div>
                <div class="flex">
                    <div>
                        <label for="query">Write Query</label>
                        <input type="text" class="classInput" id="query" name="query" placeholder="Write Query" required/>
                    </div>
                    <div>
                        <label for="category_limit">Category Limit</label>
                        <input type="number" class="classInput" id="category_limit" name="category_limit" placeholder="Category Limit"
                                required/>
                    </div>
                    <div>
                        <label for="description_limit">Description Limit (in words)</label>
                        <input type="number" class="classInput" id="description_limit" name="description_limit"
                               placeholder="Number of words" required/>
                    </div>
                </div>
                <button class="submit-btn" name="call_ai_experience">Submit</button>
            </div>
        </form>
    </div>
</div>
<script>
    const openModalBtn = document.getElementById("openModalBtn");
    const modal = document.getElementById("myModal");
    const closeModalBtn = document.querySelector(".close");

    openModalBtn.addEventListener("click", function () {
        modal.style.display = "flex";
    });

    closeModalBtn.addEventListener("click", function () {
        modal.style.display = "none";
    });

    window.addEventListener("click", function (event) {
        if (event.target === modal) {
            modal.style.display = "none";
        }
    });
</script>
{% endblock %}
